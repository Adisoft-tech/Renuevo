name: Renuevo
options:
  bundleIdPrefix: com.renuevo
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 48CX3G6R98
    SUPPORTS_MACCATALYST: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Renuevo:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: RenuevoApp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.renuevo.app
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Renuevo
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: RenuevoApp/Renuevo.entitlements
    dependencies:
      - target: RenuevoWidget
        embed: true
      - sdk: UserNotifications.framework

  RenuevoWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: RenuevoWidget
      - path: Shared
    info:
      path: RenuevoWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.renuevo.app.RenuevoWidget
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: RenuevoWidget/RenuevoWidget.entitlements
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  RenuevoMenuBar:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: RenuevoMenuBar
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.renuevo.app.menubar
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Renuevo
        INFOPLIST_KEY_LSUIElement: YES
        ENABLE_HARDENED_RUNTIME: YES
